services:
  postgres:
    image: postgres:16-alpine
    container_name: pageturner-db
    environment:
      POSTGRES_USER: ${DB_USER:-pageturner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pageturner}
      POSTGRES_DB: ${DB_NAME:-pageturner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pageturner-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pageturner} -d ${DB_NAME:-pageturner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pageturner-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pageturner}
      DB_PASSWORD: ${DB_PASSWORD:-pageturner}
      DB_NAME: ${DB_NAME:-pageturner}
      SSL_MODE: disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pageturner-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: pageturner-frontend
    environment:
      PUBLIC_API_URL: http://backend:8080
      ORIGIN: http://localhost:5173
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - pageturner-network
    restart: unless-stopped
    volumes:
      - sqlite_data:/data

volumes:
  postgres_data:
  sqlite_data:

networks:
  pageturner-network:
    driver: bridge
